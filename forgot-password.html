<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إشعارك | استعادة كلمة المرور</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script type="module" src="/assets/js/main.js"></script>
</head>
<body class="font-alexandria bg-gray-50 text-gray-900 relative antialiased flex flex-col min-h-screen overflow-x-hidden">
    <!-- Blurred Blobs Background -->
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
        
        
    </div>

    <!-- Navbar -->
    <div data-include="/components/navbar.html"></div>

    <main class="flex-grow flex flex-col items-center justify-center pt-32 pb-16">
        <div class="container mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
            <div class="sm:mx-auto sm:w-full sm:max-w-md" x-data="{ step: 1 }">
        <img class="mx-auto h-16 w-auto" src="https://res.cloudinary.com/dgvm9lodv/image/upload/q_auto/f_auto/v1777741018/v2-1_j0k3z1.png" alt="إشعارك">
        
        <h2 x-show="step === 1" class="mt-6 text-center text-3xl font-extrabold flex flex-wrap items-center justify-center">
            <span class="text-[#0b3fe4] ml-2 leading-none mt-1">•</span>
            <span class="text-gradient">نسيت كلمة المرور؟ 🔒</span>
        </h2>
        <p x-show="step === 1" class="mt-2 text-center text-sm text-gray-600">
            أدخل رقم هاتفك وسنرسل لك رمز التحقق.
        </p>

        <h2 x-show="step === 2" style="display: none;" class="mt-6 text-center text-3xl font-extrabold flex flex-wrap items-center justify-center">
            <span class="text-[#0b3fe4] ml-2 leading-none mt-1">•</span>
            <span class="text-gradient">أدخل رمز التحقق ✉️</span>
        </h2>
        <p x-show="step === 2" style="display: none;" class="mt-2 text-center text-sm text-gray-600">
            قمنا بإرسال رسالة SMS تحتوي على الرمز.
        </p>

        <div class="mt-8 bg-white rounded-2xl shadow-sm border border-gray-100 py-8 px-4 sm:px-10">
            <!-- Step 1: Phone Number -->
            <form x-show="step === 1" @submit.prevent="step = 2" class="space-y-6">
                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700">رقم الهاتف</label>
                    <div class="mt-2 text-left" dir="ltr">
                        <input id="phone" name="phone" type="tel" autocomplete="tel" required class="block w-full appearance-none rounded-full border border-gray-300 px-4 py-3 placeholder-gray-400 shadow-sm focus:border-primary-500 focus:outline-none focus:ring-primary-500 sm:text-sm bg-white/50 backdrop-blur-sm transition-all" placeholder="0123456789">
                    </div>
                </div>

                <div>
                    <button type="submit" class="flex w-full justify-center rounded-full border border-transparent bg-primary-500 py-3.5 px-4 text-sm font-semibold text-white shadow-sm hover:bg-primary-600 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-all hover:-translate-y-0.5">
                        إرسال رمز التحقق
                    </button>
                </div>
            </form>

            <!-- Step 2: OTP Entry -->
            <form x-show="step === 2" style="display: none;" action="#" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 text-center mb-4">الرمز (OTP)</label>
                    <div class="flex justify-center gap-2 mt-2" dir="ltr">
                        <input type="text" maxlength="1" class="w-12 h-14 text-center text-2xl font-bold bg-white/50 border border-gray-300 rounded-xl focus:border-primary-500 focus:ring-primary-500 outline-none transition-all">
                        <input type="text" maxlength="1" class="w-12 h-14 text-center text-2xl font-bold bg-white/50 border border-gray-300 rounded-xl focus:border-primary-500 focus:ring-primary-500 outline-none transition-all">
                        <input type="text" maxlength="1" class="w-12 h-14 text-center text-2xl font-bold bg-white/50 border border-gray-300 rounded-xl focus:border-primary-500 focus:ring-primary-500 outline-none transition-all">
                        <input type="text" maxlength="1" class="w-12 h-14 text-center text-2xl font-bold bg-white/50 border border-gray-300 rounded-xl focus:border-primary-500 focus:ring-primary-500 outline-none transition-all">
                    </div>
                </div>

                <div>
                    <button type="submit" class="mt-4 flex w-full justify-center rounded-full border border-transparent bg-primary-500 py-3.5 px-4 text-sm font-semibold text-white shadow-sm hover:bg-primary-600 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-all hover:-translate-y-0.5">
                        التحقق والمتابعة
                    </button>
                </div>
                
                <div class="text-center mt-4">
                    <button type="button" @click="step = 1" class="text-sm font-medium text-gray-500 hover:text-gray-800 transition-colors">
                        تعديل رقم الهاتف
                    </button>
                </div>
            </form>
        </div>
    </div>
        </div>
    </main>

    <!-- Footer -->
    <div data-include="/components/footer.html"></div>
</body>
</html>
