<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إشعارك | تسجيل الدخول</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script type="module" src="/assets/js/main.js"></script>
</head>
<body class="font-alexandria bg-gray-50 text-gray-900 relative antialiased flex flex-col min-h-screen overflow-x-hidden">
    <!-- Blurred Blobs Background -->
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
        
        
    </div>

    <!-- Navbar -->
    <div data-include="/components/navbar.html"></div>

    <main class="flex-grow flex flex-col items-center justify-center pt-32 pb-16">
        <div class="container mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
            <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <img class="mx-auto h-16 w-auto" src="https://res.cloudinary.com/dgvm9lodv/image/upload/q_auto/f_auto/v1777741018/v2-1_j0k3z1.png" alt="إشعارك">
        <h2 class="mt-6 text-center text-3xl font-extrabold flex flex-wrap items-center justify-center">
            <span class="text-[#0b3fe4] ml-2 leading-none mt-1">•</span>
            <span class="text-gradient">مرحباً بك مجدداً 👋</span>
        </h2>
        <p class="mt-2 text-center text-sm text-gray-600">
            أو
            <a href="/register.html" class="font-medium text-primary-500 hover:text-primary-600 transition-colors">
                قم بإنشاء حساب جديد
            </a>
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 py-8 px-4 sm:px-10">
            <form class="space-y-6" action="#" method="POST">
                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700">رقم الهاتف</label>
                    <div class="mt-2">
                        <input id="phone" name="phone" type="tel" autocomplete="tel" required class="block w-full appearance-none rounded-full border border-gray-300 px-4 py-3 placeholder-gray-400 shadow-sm focus:border-primary-500 focus:outline-none focus:ring-primary-500 sm:text-sm bg-white/50 backdrop-blur-sm transition-all text-left" dir="ltr" placeholder="0123456789">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">كلمة المرور</label>
                    <div class="mt-2">
                        <input id="password" name="password" type="password" autocomplete="current-password" required class="block w-full appearance-none rounded-full border border-gray-300 px-4 py-3 placeholder-gray-400 shadow-sm focus:border-primary-500 focus:outline-none focus:ring-primary-500 sm:text-sm bg-white/50 backdrop-blur-sm transition-all text-left" dir="ltr" placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 rounded border-gray-300 text-primary-600 focus:ring-primary-500">
                        <label for="remember-me" class="mr-2 block text-sm text-gray-900">تذكرني</label>
                    </div>

                    <div class="text-sm">
                        <a href="/forgot-password.html" class="font-semibold text-primary-500 hover:text-primary-600 transition-colors">نسيت كلمة المرور؟</a>
                    </div>
                </div>

                <div>
                    <button type="submit" class="flex w-full justify-center rounded-full border border-transparent bg-primary-500 py-3.5 px-4 text-sm font-semibold text-white shadow-sm hover:bg-primary-600 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-all hover:-translate-y-0.5">
                        تسجيل الدخول
                    </button>
                </div>
            </form>
        </div>
    </div>
        </div>
    </main>

    <!-- Footer -->
    <div data-include="/components/footer.html"></div>
</body>
</html>
